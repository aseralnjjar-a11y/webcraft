<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد | Web Craft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-mascot-page signup-page auth-split-page">

    <!-- شاشة التحميل الانتقالية -->
    <div id="mainPreloader" class="premium-loader-overlay active">
        <h1 class="loader-logo fw-bold text-white">WEB<span class="text-grad">CRAFT</span></h1>
    </div>
    
    <div class="login-page-wrapper">
        <!-- العمود الأيسر: لاب توب + فيديو يثبت بعد فتح الغطاء -->
        <div class="mascot-panel" id="showcase-panel">
            <video autoplay muted playsinline class="background-video auth-freeze-video">
                <source src="videos/background.mp4" type="video/mp4">
                متصفحك لا يدعم عرض الفيديو.
            </video>
            <div class="video-overlay"></div>
        </div>

        <!-- العمود الأيمن: نموذج التسجيل -->
        <div class="login-panel signup-form-panel auth-form-panel">
            <div class="login-form-container signup-form-scroll auth-form-scroll">
                <div class="text-center mb-4">
                    <a href="index.html" class="text-decoration-none">
                        <h2 class="fw-bold text-white tracking-tight">WEB<span class="text-grad">CRAFT</span></h2>
                    </a>
                </div>

                <div class="text-center mb-4">
                    <h4 class="fw-bold text-white mb-2">انضم إلى المستقبل</h4>
                    <p class="text-muted-custom small mb-0">أنشئ حسابك وابدأ رحلتك الرقمية معنا</p>
                </div>

                <form id="signupForm">
                    <div class="form-group-animated mb-3">
                        <input type="text" id="name" class="form-control-animated" placeholder=" " required autocomplete="name">
                        <label for="name">الاسم الكامل</label>
                    </div>

                    <div class="form-group-animated mb-3">
                        <input type="email" id="email" class="form-control-animated" placeholder=" " required autocomplete="email">
                        <label for="email">البريد الإلكتروني</label>
                    </div>

                    <div class="form-group-animated mb-2">
                        <input type="password" id="password" class="form-control-animated form-input-with-toggle" placeholder=" " required autocomplete="new-password">
                        <label for="password">كلمة المرور</label>
                        <button type="button" class="password-toggle-animated" id="togglePassword" tabindex="-1" aria-label="إظهار كلمة المرور">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>

                    <div id="password-strength-container" class="password-strength-block mb-3">
                        <div class="password-strength-bar">
                            <div class="strength-segment"></div>
                            <div class="strength-segment"></div>
                            <div class="strength-segment"></div>
                        </div>
                        <small id="password-strength-text" class="text-muted-custom d-block mt-2"></small>
                    </div>

                    <div class="form-group-animated mb-3">
                        <input type="password" id="confirmPassword" class="form-control-animated form-input-with-toggle" placeholder=" " required autocomplete="new-password">
                        <label for="confirmPassword">تأكيد كلمة المرور</label>
                        <button type="button" class="password-toggle-animated" id="toggleConfirmPassword" tabindex="-1" aria-label="إظهار تأكيد كلمة المرور">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>

                    <div id="signupError" class="alert alert-danger py-2 mb-3 text-center small rounded-3" style="display:none;"></div>

                    <button type="submit" class="btn-login-animated w-100 mb-3">
                        إنشاء الحساب
                    </button>
                </form>

                <div class="divider-animated mb-3">
                    <span>أو انضم عبر</span>
                </div>

                <div class="social-login-wrapper signup-google-wrap auth-google-wrap mb-4">
                    <div id="googleBtn"></div>
                </div>

                <div class="text-center pb-2">
                    <p class="text-muted-custom small mb-0">
                        لديك حساب بالفعل؟
                        <a href="login.html" class="text-accent-primary fw-bold text-decoration-none ms-1">سجل دخولك</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="auth-showcase.js"></script>
    <script src="signup.js"></script>
</body>
</html>
