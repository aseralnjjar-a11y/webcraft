<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة كلمة المرور | Web Craft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-mascot-page auth-split-page">

    <div class="login-page-wrapper justify-content-center align-items-center w-100">
        <div class="login-card-modern" style="max-width: 500px; width: 90%;">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-white tracking-tight">WEB<span class="text-grad">CRAFT</span></h2>
                <h4 class="fw-bold text-white mt-4 mb-2">استعادة كلمة المرور</h4>
                <p class="text-muted-custom small">أدخل بريدك الإلكتروني وسنرسل لك تعليمات استعادة كلمة المرور.</p>
            </div>

            <form id="forgotForm">
                <div class="form-group-animated mb-4">
                    <input type="email" id="forgotEmail" class="form-control-animated" placeholder=" " required>
                    <label for="forgotEmail">البريد الإلكتروني</label>
                </div>

                <div id="forgotMessage" class="alert py-2 mb-4 text-center small rounded-3" style="display:none;"></div>

                <button type="submit" class="btn-login-animated w-100">
                    إرسال رابط الاستعادة
                </button>
            </form>

            <div class="text-center mt-4">
                <a href="login.html" class="text-muted-custom small text-decoration-none">
                    <i class="fas fa-arrow-right ms-1"></i> العودة لتسجيل الدخول
                </a>
            </div>
        </div>
    </div>

    <script>
        const SERVER_URL = 'https://webcraft-bw34.onrender.com';
        const forgotForm = document.getElementById('forgotForm');
        const messageDiv = document.getElementById('forgotMessage');
        const btn = forgotForm.querySelector('button');

        forgotForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('forgotEmail').value;
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';
            btn.disabled = true;
            messageDiv.style.display = 'none';

            try {
                const response = await fetch(`${SERVER_URL}/api/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const result = await response.json();
                console.log("Server Response:", result); // طباعة الاستجابة في الكونسول للفحص

                messageDiv.textContent = result.message;
                messageDiv.style.display = 'block';
                
                if (response.ok) {
                    messageDiv.className = 'alert alert-success py-2 mb-4 text-center small rounded-3';
                    forgotForm.reset();
                } else {
                    messageDiv.className = 'alert alert-danger py-2 mb-4 text-center small rounded-3';
                }
            } catch (error) {
                messageDiv.textContent = 'خطأ في الاتصال بالخادم';
                messageDiv.className = 'alert alert-danger py-2 mb-4 text-center small rounded-3';
                messageDiv.style.display = 'block';
            } finally {
                btn.innerHTML = 'إرسال رابط الاستعادة';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
