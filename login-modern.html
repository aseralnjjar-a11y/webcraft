<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | Web Craft</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="login-modern.css">
</head>
<body class="login-split-page">

    <div class="login-split-container">
        <!-- Right Panel: Login Form -->
        <div class="login-form-panel">
            <div class="login-card-modern">
                <div class="brand-logo">
                    WEB<span class="gradient-text">CRAFT</span>
                </div>
                
                <div class="form-header">
                    <h1>أهلاً بعودتك!</h1>
                    <p>أدخل بياناتك للوصول إلى حسابك</p>
                </div>

                <form id="loginForm">
                    <!-- Floating Label Email Input -->
                    <div class="form-group-floating">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="email" class="form-control-login" placeholder=" " required>
                        <label for="email">البريد الإلكتروني</label>
                    </div>

                    <!-- Floating Label Password Input -->
                    <div class="form-group-floating">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" class="form-control-login" placeholder=" " required>
                        <label for="password">كلمة المرور</label>
                        <button type="button" class="password-toggle" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox"> تذكرني
                        </label>
                        <a href="#" class="forgot-pass">نسيت كلمة المرور؟</a>
                    </div>

                    <button type="submit" class="btn-login-modern">
                        <span>تسجيل الدخول</span>
                        <i class="fas fa-arrow-left"></i>
                    </button>
                </form>

                <div class="divider">
                    <span>أو عبر</span>
                </div>

                <div class="social-login">
                    <a href="#" class="social-btn google"><i class="fab fa-google"></i></a>
                    <a href="#" class="social-btn facebook"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social-btn apple"><i class="fab fa-apple"></i></a>
                </div>

                <p class="auth-footer">
                    ليس لديك حساب؟ <a href="#">إنشاء حساب جديد</a>
                </p>
            </div>
        </div>

        <!-- Left Panel: Visual Showcase -->
        <div class="login-visual-panel">
            <!-- Floating Cards -->
            <div class="floating-card card-1" data-speed="2">
                <i class="fas fa-layer-group"></i>
                <p>واجهات عصرية</p>
            </div>
            <div class="floating-card card-2" data-speed="-3">
                <i class="fas fa-rocket"></i>
                <p>أداء فائق</p>
            </div>
            <div class="floating-card card-3" data-speed="1.5">
                <i class="fas fa-shield-alt"></i>
                <p>أمان متقدم</p>
            </div>

            <div class="visual-content">
                <h2 class="visual-title">بوابتك نحو الإبداع الرقمي</h2>
                <p class="visual-subtext">منصة متكاملة تجمع بين التصميم الأنيق والهندسة البرمجية القوية لتحقيق أهدافك.</p>
            </div>
        </div>
    </div>

    <script src="login-modern.js"></script>
</body>
</html>
