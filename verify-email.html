<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفعيل الحساب | Web Craft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-mascot-page auth-split-page">

    <div class="login-page-wrapper justify-content-center align-items-center w-100">
        <div class="login-card-modern text-center" style="max-width: 500px; width: 90%; padding: 3rem;">
            <div id="loadingState">
                <i class="fas fa-spinner fa-spin fa-3x text-accent-primary mb-4"></i>
                <h4 class="text-white">جاري تفعيل حسابك...</h4>
            </div>

            <div id="resultState" style="display: none;">
                <div id="iconContainer" class="mb-4"></div>
                <h4 id="resultTitle" class="fw-bold text-white mb-3"></h4>
                <p id="resultMessage" class="text-muted-custom mb-4"></p>
                <a href="login.html" class="btn btn-login-animated w-100">تسجيل الدخول</a>
            </div>
        </div>
    </div>

    <script>
        const SERVER_URL = 'https://webcraft-bw34.onrender.com';
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        async function verifyEmail() {
            const loading = document.getElementById('loadingState');
            const result = document.getElementById('resultState');
            const icon = document.getElementById('iconContainer');
            const title = document.getElementById('resultTitle');
            const msg = document.getElementById('resultMessage');

            try {
                const response = await fetch(`${SERVER_URL}/api/auth/verify-email`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
                const data = await response.json();

                loading.style.display = 'none';
                result.style.display = 'block';
                
                if (response.ok) {
                    icon.innerHTML = '<i class="fas fa-check-circle fa-4x text-success"></i>';
                    title.textContent = 'تم تفعيل الحساب بنجاح!';
                    msg.textContent = 'أهلاً بك في Web Craft. يمكنك الآن تسجيل الدخول بحسابك.';
                } else {
                    icon.innerHTML = '<i class="fas fa-times-circle fa-4x text-danger"></i>';
                    title.textContent = 'فشل التفعيل';
                    msg.textContent = data.message || 'الرابط غير صالح أو منتهي الصلاحية.';
                }
            } catch (error) {
                loading.style.display = 'none';
                result.style.display = 'block';
                icon.innerHTML = '<i class="fas fa-exclamation-triangle fa-4x text-warning"></i>';
                title.textContent = 'خطأ في الاتصال';
                msg.textContent = 'تأكد من اتصالك بالإنترنت وحاول مرة أخرى.';
            }
        }

        if (token) {
            verifyEmail();
        } else {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('resultState').style.display = 'block';
            document.getElementById('resultTitle').textContent = 'رابط غير صالح';
            document.getElementById('resultMessage').textContent = 'لم يتم العثور على رمز التفعيل.';
        }
    </script>
</body>
</html>
