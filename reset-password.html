<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعيين كلمة المرور الجديدة | Web Craft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-mascot-page auth-split-page">

    <div class="login-page-wrapper justify-content-center align-items-center w-100">
        <div class="login-card-modern" style="max-width: 500px; width: 90%;">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-white tracking-tight">WEB<span class="text-grad">CRAFT</span></h2>
                <h4 class="fw-bold text-white mt-4 mb-2">كلمة المرور الجديدة</h4>
            </div>

            <form id="resetForm">
                <div class="form-group-animated mb-3">
                    <input type="password" id="newPassword" class="form-control-animated" placeholder=" " required minlength="6">
                    <label for="newPassword">كلمة المرور الجديدة</label>
                </div>

                <div class="form-group-animated mb-4">
                    <input type="password" id="confirmNewPassword" class="form-control-animated" placeholder=" " required>
                    <label for="confirmNewPassword">تأكيد كلمة المرور</label>
                </div>

                <div id="resetMessage" class="alert py-2 mb-4 text-center small rounded-3" style="display:none;"></div>

                <button type="submit" class="btn-login-animated w-100">
                    حفظ كلمة المرور
                </button>
            </form>
        </div>
    </div>

    <script>
        const SERVER_URL = 'https://webcraft-bw34.onrender.com';
        const resetForm = document.getElementById('resetForm');
        const messageDiv = document.getElementById('resetMessage');
        const btn = resetForm.querySelector('button');

        // الحصول على التوكن من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            messageDiv.textContent = 'رابط غير صالح. تأكد من نسخ الرابط كاملاً من البريد الإلكتروني.';
            messageDiv.className = 'alert alert-danger';
            messageDiv.style.display = 'block';
            btn.disabled = true;
        }

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmNewPassword').value;

            if (password !== confirm) {
                messageDiv.textContent = 'كلمات المرور غير متطابقة.';
                messageDiv.className = 'alert alert-danger';
                messageDiv.style.display = 'block';
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';
            btn.disabled = true;

            try {
                const response = await fetch(`${SERVER_URL}/api/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword: password })
                });
                
                const result = await response.json();

                if (response.ok) {
                    messageDiv.textContent = 'تم تغيير كلمة المرور بنجاح! جاري تحويلك لصفحة الدخول...';
                    messageDiv.className = 'alert alert-success';
                    messageDiv.style.display = 'block';
                    resetForm.style.display = 'none';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                } else {
                    messageDiv.textContent = result.message;
                    messageDiv.className = 'alert alert-danger';
                    messageDiv.style.display = 'block';
                    btn.innerHTML = 'حفظ كلمة المرور';
                    btn.disabled = false;
                }
            } catch (error) {
                messageDiv.textContent = 'خطأ في الاتصال بالخادم';
                messageDiv.className = 'alert alert-danger';
                messageDiv.style.display = 'block';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
