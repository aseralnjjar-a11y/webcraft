<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | Web Craft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-mascot-page">
    
    <div class="login-page-wrapper">
        <!-- Left Column: Animated Mascot -->
        <div class="mascot-panel" id="showcase-panel">
            <!-- Video Background -->
            <video autoplay loop muted playsinline class="background-video">
                <!-- قم بتغيير المصدر إلى مسار الفيديو الخاص بك، مثلاً: "videos/background.mp4" -->
                <source src="videos/background.mp4" type="video/mp4">
                متصفحك لا يدعم عرض الفيديو.
            </video>
            <div class="video-overlay"></div>
        </div>

        <!-- Right Column: Login Form -->
        <div class="login-panel">
            <div class="login-form-container">
                <div class="text-center mb-4">
                    <a href="index.html" class="text-decoration-none">
                        <h2 class="fw-bold text-white tracking-tight">WEB<span class="text-grad">CRAFT</span></h2>
                    </a>
                </div>

                <div class="text-center mb-5">
                    <h4 class="fw-bold text-white mb-2">أهلاً بعودتك!</h4>
                    <p class="text-muted-custom small">سجل دخولك وشاهد مساعدك الرقمي يتفاعل معك</p>
                </div>

                <form id="loginForm">
                    <!-- Email Field -->
                    <div class="form-group-animated mb-4">
                        <input type="email" id="email" class="form-control-animated" placeholder=" " required autocomplete="email">
                        <label for="email" class="form-label-animated">البريد الإلكتروني</label>
                    </div>

                    <!-- Password Field -->
                    <div class="form-group-animated mb-4">
                        <input type="password" id="password" class="form-control-animated" placeholder=" " required autocomplete="current-password">
                        <label for="password" class="form-label-animated">كلمة المرور</label>
                        <button type="button" class="password-toggle-animated" id="togglePassword" tabindex="-1">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>

                    <!-- Form Options -->
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" role="switch" id="rememberMeSwitch">
                            <label class="form-check-label small text-muted-custom" for="rememberMeSwitch">تذكرني</label>
                        </div>
                        <a href="#" class="small text-accent-primary fw-bold text-decoration-none">نسيت كلمة المرور؟</a>
                    </div>

                    <!-- Error Message -->
                    <div id="loginError" class="alert alert-danger py-2 mb-4 text-center small rounded-3" style="display:none;"></div>

                    <!-- Standard Login Button -->
                    <button type="submit" class="btn-login-animated w-100">
                        تسجيل الدخول
                    </button>
                </form>

                <!-- Divider -->
                <div class="divider-animated my-4">
                    <span>أو سجل الدخول عبر</span>
                </div>

                <!-- Social Login -->
                <div class="social-login-wrapper mb-4">
                    <div id="googleBtn"></div>
                </div>

                <!-- Create Account Link -->
                <div class="text-center">
                    <p class="text-muted-custom small mb-0">
                        ليس لديك حساب؟ 
                        <a href="#" class="text-accent-primary fw-bold text-decoration-none ms-1">أنشئ حساباً الآن</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="login.js"></script>
</body>
</html>
